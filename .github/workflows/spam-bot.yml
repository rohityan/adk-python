name: ADK Spam Sweeper

on:
  schedule:
    # Runs daily at 2:00 AM UTC
    - cron: '0 2 * * *'
  
  # Allows manual triggering from the GitHub Actions tab
  workflow_dispatch:
    inputs:
      full_scan:
        description: 'Run an Initial Full Scan of ALL open issues'
        required: false
        type: boolean
        default: false

jobs:
  sweep-spam:
    runs-on: ubuntu-latest
    timeout-minutes: 120 # Might need more time for a full scan!
    permissions:
      issues: write
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests google-adk python-dotenv

      - name: Run Spam Sweeper Agent
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
          OWNER: ${{ github.repository_owner }}
          REPO: ${{ github.event.repository.name }}
          CONCURRENCY_LIMIT: 3
          # Map the GitHub UI checkbox to our environment variable!
          INITIAL_FULL_SCAN: ${{ github.event.inputs.full_scan == 'true' }}
        run: python -m spam_sweeper_agent.main